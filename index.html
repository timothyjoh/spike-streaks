<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Streaks</title>
    <style>
      .habit-streaks {
        display: flex;
        gap: 1rem;
        font-size: 0.875rem;
        margin: 4px 0;
      }
      .heatmap-grid {
        display: grid;
        grid-template-rows: repeat(7, 12px);
        grid-auto-flow: column;
        grid-auto-columns: 12px;
        gap: 2px;
        margin: 8px 0;
        overflow-x: auto;
      }
      .heatmap-cell {
        width: 12px;
        height: 12px;
        border-radius: 2px;
        background: #ebedf0;
        cursor: pointer;
        box-sizing: border-box;
      }
      .heatmap-cell.cell--out-of-range {
        background: transparent;
        cursor: default;
        pointer-events: none;
      }
      .heatmap-cell.cell--done {
        /* background set by inline style to habit.color */
        opacity: 1;
      }
      .heatmap-cell.cell--today {
        outline: 2px solid #333;
        outline-offset: 1px;
      }
      .habit-color-swatch {
        display: inline-block;
        width: 12px;
        height: 12px;
        border-radius: 50%;
        margin-right: 4px;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
